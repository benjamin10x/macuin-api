{% extends "base.html" %}
{% block title %}Editar Autoparte - MACUIN{% endblock %}
{% block content %}
<div class="form-container">
    <h1>Editar Autoparte</h1>
    <form method="POST">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" class="form-control" value="{{ autoparte.nombre }}" required>
        </div>
        <div class="form-group">
            <label>Categoría</label>
            <input type="text" name="categoria" class="form-control" value="{{ autoparte.categoria }}" required>
        </div>
        <div class="form-group">
            <label>Precio</label>
            <input type="number" name="precio" class="form-control" step="0.01" value="{{ autoparte.precio }}" required>
        </div>
        <div class="form-group">
            <label>Stock</label>
            <input type="number" name="stock" class="form-control" value="{{ autoparte.stock }}" required>
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion" class="form-control" rows="3">{{ autoparte.descripcion }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Actualizar</button>
        <a href="{{ url_for('main.autopartes') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
