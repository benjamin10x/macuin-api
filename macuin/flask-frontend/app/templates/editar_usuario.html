{% extends "base.html" %}
{% block title %}Editar Usuario - MACUIN{% endblock %}
{% block content %}
<div class="form-container">
    <h1>Editar Usuario</h1>
    <form method="POST">
        <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" name="nombre" class="form-control" value="{{ usuario.nombre }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" value="{{ usuario.email }}" required>
        </div>
        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="telefono" class="form-control" value="{{ usuario.telefono or '' }}">
        </div>
        <div class="form-group">
            <label>Nueva contraseña (dejar vacío para no cambiar)</label>
            <input type="password" name="password" class="form-control" minlength="6">
        </div>
        <div class="form-group">
            <label>Rol</label>
            <select name="rol" class="form-control">
                <option value="cliente" {{ 'selected' if usuario.rol == 'cliente' }}>Cliente</option>
                <option value="admin" {{ 'selected' if usuario.rol == 'admin' }}>Admin</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Actualizar</button>
        <a href="{{ url_for('main.usuarios') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
